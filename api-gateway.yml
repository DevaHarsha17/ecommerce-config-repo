server:
  port: 8080
  
  

spring:
  application:
    name: api-gateway
   
  cloud:
    gateway:
      routes:
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/products/**
        - id: customer-service
          uri: lb://customer-service
          predicates:
            - Path=/customers/**
        - id: customer-auth
          uri: lb://customer-service
          predicates:
            - Path=/auth/**
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/orders/**


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
      
jwt:
  secret: mysupersecuresecretkeymysupersecuresecretkey
  expiration: 3600000

management:
  tracing:
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

